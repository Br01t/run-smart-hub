<!doctype html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f7a5c" />

    <!-- Canonical Domain Enforcer -->
    <script>
      (function() {
        var host = window.location.hostname;
        var protocol = window.location.protocol;
        var isLocal = host === 'localhost' || host === '127.0.0.1' || host.startsWith('192.168.');
        
        if (!isLocal) {
          var targetHost = 'www.runners-hub.org';
          var needsHttps = protocol !== 'https:';
          var needsWww = host === 'runners-hub.org';
          
          if (needsHttps || needsWww) {
            window.location.replace('https://' + targetHost + window.location.pathname + window.location.search + window.location.hash);
          }
        }
      })();
    </script>

    <!-- GitHub Pages SPA: restore path from 404.html redirect query string -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
